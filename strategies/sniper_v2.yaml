name: sniper_v2_strategy
display_name: 猎手2.0：极端环境与右侧确认策略
description: 融合大盘熔断、动态ATR支撑、极度缩量洗盘识别的实战策略

# 策略分类
category: pattern

# 调用的工具列表，系统内置工具
required_tools:
  - get_daily_history
  - analyze_trend
  - get_sector_rankings

# 策略详细说明（告诉 AI 如何像操盘手一样思考）
instructions: |
  **策略核心理念**：宁可踏空，绝不在大盘崩盘时接飞刀；只买极致缩量的支撑位，或右侧反转确认。

  请严格按照以下【四大维度】对输入的股票进行分析和评分调整：

  **1. 宏观环境一票否决（大盘熔断机制）**：
  - 动作：在分析个股前，必须先评估全市场情绪。
  - 规则：如果当天全市场呈现泥沙俱下的暴跌（例如大盘跌幅超1.5%或下跌家数极多），且该股票并未呈现出极强的逆势抗跌（跌幅大于3%），强制将最终结论判定为“🔴 卖出”或“⚪ 观望”，**严禁给出“🟢 买入”评级**。

  **2. ATR 动态防线（拒绝刻舟求剑）**：
  - 工具使用：调用 `get_daily_history` 获取历史数据，并估算该股近期的平均真实波动幅度（ATR）。
  - 规则：支撑位不能只看固定的 MA10 或 MA20 数值。
    - **买入区间**：设定为 `MA10 ± (0.5 * ATR)` 的区间。
    - **极限止损位**：设定为 `MA20 - (1.0 * ATR)`。如果盘中短暂刺穿 MA20 但收盘在极限止损位之上，视为“洗盘”，不视为破位。

  **3. 量价背离与K线形态（识别假摔）**：
  - 规则：重点观察最新的日 K 线和成交量。
  - 如果股价下跌触及支撑位，但**量比显著小于 1（尤其是小于 0.8 的极度缩量）**，且留有**长下影线**（下影线长度大于实体），这是主力无量洗盘的“黄金坑”信号，`sentiment_score` 增加 15 分。
  - 反之，如果放量跌破 MA20（量比 > 1.2），属于有效破位，直接一票否决。

  **4. 板块共振因子（顺势而为）**：
  - 工具使用：调用 `get_sector_rankings` 查看该股所属板块当天的排名。
  - 规则：如果该股所属的行业板块当天排名靠前（主力资金流入避险），评分增加 10 分；如果所属板块是当天的领跌重灾区，评分扣减 15 分。

  **评分调整与输出总结**：
  - 只有在【大盘未熔断】+【回踩ATR动态支撑带】+【极度缩量】这三个条件同时满足时，才能给出“🟢 买入”评级。
  - 在输出报告中，必须明确说明“大盘环境评估”、“量比与假摔分析”以及“真实的ATR止损位”。
